run_now:
  name: Run irrigation now
  description: >-
    Start a manual pulse-and-soak watering event. Confirmed pump-on time is
    accumulated in today's delivered total and reduces later automatic watering.
  fields:
    config_entry_id:
      name: Configuration entry
      description: Solar Irrigation configuration to run.
      required: true
      selector:
        config_entry:
          integration: solar_irrigation
    duration:
      name: Duration
      description: >-
        Optional total pump-on time in minutes. The integration divides this time
        into configured watering pulses separated by soak intervals.
      required: false
      selector:
        number:
          min: 0.01
          max: 1440
          step: 0.1
          unit_of_measurement: min
          mode: box
    ignore_rain:
      name: Ignore rain
      description: >-
        Ignore both rain blocking and rain reduction for this manual event. With
        no duration, the dry solar-scaled remaining budget is used.
      required: false
      default: false
      selector:
        boolean:
stop:
  name: Stop irrigation
  description: Stop the active watering or soak cycle.
  fields:
    config_entry_id:
      name: Configuration entry
      description: Solar Irrigation configuration to stop.
      required: true
      selector:
        config_entry:
          integration: solar_irrigation
